<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет курьера | Night Courier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0b101b;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .card {
            background: rgba(22,27,34,0.96);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,212,255,0.2);
        }
        h2 { color: #00d4ff; margin-bottom: 15px; }
        .order-item {
            background: #0f1622;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid #00d4ff;
        }
        .order-item.available { border-left-color: #ff8800; }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            flex-wrap: wrap;
        }
        .order-id { color: #00d4ff; }
        .order-sum { color: #28a745; }
        .order-details { font-size: 13px; color: #aaa; margin-bottom: 10px; line-height: 1.5; }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 5px;
        }
        .btn-take { background: #ff8800; color: #fff; }
        .btn-done { background: #28a745; color: #fff; }
        .reply-area {
            margin-top: 12px;
            display: none;
        }
        .reply-area input {
            width: 70%;
            background: #0f1622;
            border: 1px solid #2a3a55;
            border-radius: 20px;
            padding: 8px 12px;
            color: #fff;
        }
        .login-form {
            max-width: 350px;
            margin: 100px auto;
            text-align: center;
        }
        .login-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f1622;
            border: 1px solid #2a3a55;
            border-radius: 12px;
            color: #fff;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .stat-card {
            background: #0f1622;
            padding: 15px;
            border-radius: 16px;
            flex: 1;
            min-width: 100px;
        }
        .stat-number { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .badge {
            background: #ff8800;
            color: #000;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div id="loginForm" class="login-form card">
    <h2>🚚 Вход для курьера</h2>
    <input type="text" id="loginUsername" placeholder="Логин">
    <input type="password" id="loginPassword" placeholder="Пароль">
    <button onclick="doLogin()">ВОЙТИ</button>
    <p style="font-size: 11px; margin-top: 15px; color: #888;">Логины: ivan, petr, admin | Пароли: 1234, 5678, admin123</p>
</div>

<div id="cabinet" style="display:none;">
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>🚚 Кабинет курьера: <span id="courierName"></span></h1>
            <button onclick="logout()" style="background:#555; width: auto;">Выйти</button>
        </div>
        
        <div class="stats" id="statsBlock"></div>
        
        <div class="card">
            <h2>📋 Доступные заказы</h2>
            <div id="availableOrdersList">Загрузка...</div>
        </div>
        
        <div class="card">
            <h2>✅ Мои заказы</h2>
            <div id="myOrdersList">Загрузка...</div>
        </div>
    </div>
</div>

<script>
    const APP_SCRIPT_URL = 'https://vk.com/away.php?to=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbywXfSTT9bOGsnqQHWzwshy_RWWm0cMxylNtFVzphW_xfn3vmgb7rE5X8F0kNfQItA4%2Fexec&utf=1';
    
    const COURIERS = {
        'ivan': '1234',
        'petr': '5678',
        'admin': 'admin123'
    };

    let currentCourier = null;
    let allOrders = [];

    function doLogin() {
        const login = document.getElementById('loginUsername').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        if (COURIERS[login] && COURIERS[login] === pass) {
            currentCourier = login;
            document.getElementById('courierName').innerText = login;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('cabinet').style.display = 'block';
            loadOrders();
            setInterval(loadOrders, 15000);
        } else {
            alert('Неверный логин или пароль');
        }
    }

    function logout() {
        currentCourier = null;
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('cabinet').style.display = 'none';
    }

    async function loadOrders() {
        try {
            const response = await fetch(APP_SCRIPT_URL + '?action=getOrders&courier=' + currentCourier);
            const data = await response.json();
            allOrders = data;
            renderAvailableOrders();
            renderMyOrders();
            renderStats();
        } catch(e) { console.error(e); }
    }

    async function takeOrder(orderId) {
        await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'take', orderId: orderId, courier: currentCourier })
        });
        loadOrders();
    }

    async function sendReply(orderId, message) {
        if (!message.trim()) return;
        await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'reply', orderId: orderId, reply: message, courier: currentCourier })
        });
        document.getElementById(`replyInput-${orderId}`).value = '';
        document.getElementById(`reply-${orderId}`).style.display = 'none';
        loadOrders();
    }

    async function markDone(orderId) {
        if (confirm('Отметить заказ как выполненный?')) {
            await fetch(APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'done', orderId: orderId, courier: currentCourier })
            });
            loadOrders();
        }
    }

    function showReply(orderId) {
        const el = document.getElementById(`reply-${orderId}`);
        if (el) el.style.display = el.style.display === 'none' || !el.style.display ? 'block' : 'none';
    }

    function renderAvailableOrders() {
        const available = allOrders.filter(o => (!o.Курьер || o.Курьер === 'available') && o.Статус !== 'done');
        const container = document.getElementById('availableOrdersList');
        if (available.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 20px;">✨ Нет доступных заказов</div>';
            return;
        }
        container.innerHTML = available.map(order => `
            <div class="order-item available">
                <div class="order-header">
                    <span class="order-id">🆔 ${order.ID}</span>
                    <span class="order-sum">💰 ${order.Сумма || '—'}</span>
                    <span class="badge">НОВЫЙ</span>
                </div>
                <div class="order-details">
                    👤 ${order.Имя || '—'} | 📞 ${order.Телефон || '—'}<br>
                    📍 ${order.Откуда || ''} → ${order.Куда || ''}<br>
                    📦 ${order.Список || '—'}
                </div>
                <button class="btn-take" onclick="takeOrder('${order.ID}')">✅ ВЗЯТЬ ЗАКАЗ</button>
            </div>
        `).join('');
    }

    function renderMyOrders() {
        const myOrders = allOrders.filter(o => o.Курьер === currentCourier && o.Статус !== 'done');
        const container = document.getElementById('myOrdersList');
        if (myOrders.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 20px;">📭 Нет активных заказов</div>';
            return;
        }
        container.innerHTML = myOrders.map(order => `
            <div class="order-item">
                <div class="order-header">
                    <span class="order-id">🆔 ${order.ID}</span>
                    <span class="order-sum">💰 ${order.Сумма || '—'}</span>
                </div>
                <div class="order-details">
                    👤 ${order.Имя || '—'} | 📞 ${order.Телефон || '—'}<br>
                    📍 ${order.Откуда || ''} → ${order.Куда || ''}
                </div>
                ${order.Сообщение_клиента ? `<div style="background:#1a2538; padding:8px; border-radius:12px; margin:8px 0;">💬 Клиент: "${order.Сообщение_клиента}"</div>` : ''}
                ${order.Ответ_курьера ? `<div style="background:#1a2538; padding:8px; border-radius:12px; margin:8px 0; border-left:2px solid #28a745;">✅ Ваш ответ: "${order.Ответ_курьера}"</div>` : ''}
                <button onclick="showReply('${order.ID}')">✏️ Ответить</button>
                <button class="btn-done" onclick="markDone('${order.ID}')">✅ Выполнен</button>
                <div id="reply-${order.ID}" class="reply-area">
                    <input type="text" id="replyInput-${order.ID}" placeholder="Ваш ответ клиенту...">
                    <button onclick="sendReply('${order.ID}', document.getElementById('replyInput-${order.ID}').value)">Отправить</button>
                </div>
            </div>
        `).join('');
    }

    function renderStats() {
        const myOrders = allOrders.filter(o => o.Курьер === currentCourier);
        const doneOrders = myOrders.filter(o => o.Статус === 'done');
        const activeOrders = myOrders.filter(o => o.Статус !== 'done');
        const totalSum = doneOrders.reduce((sum, o) => {
            let val = parseInt(String(o.Сумма).replace(/[^0-9]/g, '')) || 0;
            return sum + val;
        }, 0);
        document.getElementById('statsBlock').innerHTML = `
            <div class="stat-card"><div class="stat-number">${activeOrders.length}</div><div>В работе</div></div>
            <div class="stat-card"><div class="stat-number">${doneOrders.length}</div><div>Выполнено</div></div>
            <div class="stat-card"><div class="stat-number">${totalSum}₽</div><div>Заработано</div></div>
        `;
    }
</script>
</body>
</html>
