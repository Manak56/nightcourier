<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ночной Курьер Оренбург</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <style>
        :root { --neon: #00d4ff; --bg: #0b101b; --card: rgba(255,255,255,0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; }
        nav { background: rgba(0,0,0,0.95); padding: 15px; border-bottom: 2px solid var(--neon); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; gap: 25px; }
        nav a { color: white; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; text-align: center; }
        h1 { color: var(--neon); font-size: 2em; margin: 10px 0; text-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .calc-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: left; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .calc-input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box; }
        .price-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,212,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .price-display { background: none; border: none; color: var(--neon); font-size: 22px; font-weight: bold; text-align: right; width: 80px; }
        button { width: 100%; padding: 16px; border-radius: 30px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--neon); color: black; margin-bottom: 10px; }
        .btn-call { background: transparent; border: 2px solid #28a745; color: #28a745; text-decoration: none; display: block; text-align: center; padding: 14px; border-radius: 30px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="color:var(--neon)">Заказ</a>
        <a href="map.html">Карта 24/7</a>
        <a href="tel:+79999099924">Позвонить</a>
    </nav>
    <div class="container">
        <h1>НОЧНОЙ КУРЬЕР</h1>
        <div style="color:#28a745; font-size: 0.8em; margin-bottom: 15px;">● ОРЕНБУРГ 22:00 — 06:00</div>
        <div class="calc-box">
            <label>ЧТО НУЖНО:</label>
            <select id="serviceType" class="calc-input" onchange="updatePrice()">
                <option value="delivery">📦 Доставка (от 800₽)</option>
                <option value="driver">🚗 Трезвый водитель (от 1500₽)</option>
                <option value="help">🔋 Помощь на дороге (от 1000₽)</option>
                <option value="out-of-town">🏡 Пригород (от 2500₽)</option>
            </select>
            <label>МАРШРУТ (Откуда - Куда):</label>
            <input type="text" id="route" placeholder="Напр: Степной - Южный" class="calc-input">
            <label>ДЕТАЛИ (Список товаров/задача):</label>
            <textarea id="orderList" placeholder="Что купить или какая помощь нужна..." class="calc-input" rows="3"></textarea>
            <div class="price-row">
                <span>Ваш бюджет:</span>
                <div style="display:flex; align-items:center;">
                    <input type="number" id="userPrice" value="800" class="price-display">
                    <span style="color:var(--neon); margin-left:5px; font-weight:bold;">₽</span>
                </div>
            </div>
            <button class="btn-main" onclick="sendToTelegram()">🚀 ОТПРАВИТЬ В TELEGRAM</button>
            <a href="tel:+79999099924" class="btn-call">📞 ПОЗВОНИТЬ</a>
        </div>
    </div>
    <script>
        const prices = { delivery: 800, driver: 1500, help: 1000, 'out-of-town': 2500 };
        function updatePrice() {
            const type = document.getElementById('serviceType').value;
            document.getElementById('userPrice').value = prices[type];
        }
        function sendToTelegram() {
            const typeText = document.getElementById('serviceType').options[document.getElementById('serviceType').selectedIndex].text;
            const route = document.getElementById('route').value;
            const list = document.getElementById('orderList').value;
            const price = document.getElementById('userPrice').value;
            const min = prices[document.getElementById('serviceType').value];
            if (price < min) { alert(`Минимальная цена для этой услуги — ${min}₽`); return; }
            if (!route || !list) { alert("Заполните детали заказа!"); return; }
            const msg = `🚨 НОВЫЙ ВЫЗОВ:\n🛠 ${typeText}\n📍 МАРШРУТ: ${route}\n📋 ЗАДАЧА: ${list}\n💰 БЮДЖЕТ: ${price} ₽`;
            window.open(`https://t.me/nightcourier56?text=${encodeURIComponent(msg)}`, '_blank');
        }
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
