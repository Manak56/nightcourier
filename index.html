<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Ночной Курьер | Оренбург</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-color: #0b101b; --accent-color: #00d4ff; --text-color: #ffffff;
            --card-bg: rgba(18, 24, 34, 0.96); --tg-color: #0088cc; --call-color: #28a745;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color);
            background-image: linear-gradient(rgba(11,16,27,0.9), rgba(11,16,27,0.9)), url('https://raw.githubusercontent.com/Manak56/night-courier/main/image.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow-x: hidden;
        }

        /* АНИМАЦИЯ ПОЯВЛЕНИЯ */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        nav {
            position: sticky; top: 0; background: rgba(11, 16, 27, 0.98);
            padding: 12px; display: flex; justify-content: center; gap: 15px;
            z-index: 1000; border-bottom: 1px solid var(--accent-color); backdrop-filter: blur(10px);
        }
        nav a { color: white; text-decoration: none; font-size: 10px; text-transform: uppercase; font-weight: bold; }

        .container { max-width: 480px; margin: 0 auto; padding: 15px; }
        
        header { text-align: center; margin-bottom: 30px; }
        .logo-circle { 
            width: 90px; height: 90px; border: 2px solid var(--accent-color); border-radius: 50%; 
            margin: 0 auto 15px; overflow: hidden; box-shadow: 0 0 25px rgba(0,212,255,0.5);
            animation: pulse-glow 3s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(0,212,255,0.4); }
            50% { box-shadow: 0 0 35px rgba(0,212,255,0.8); }
            100% { box-shadow: 0 0 15px rgba(0,212,255,0.4); }
        }

        .calculator, .map-section { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            margin-bottom: 25px; border: 1px solid rgba(0,212,255,0.15);
            transition: transform 0.3s ease;
        }
        .calculator:active { transform: scale(0.99); }

        .section-title { color: var(--accent-color); font-size: 17px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .calc-row { margin-bottom: 18px; }
        .calc-row label { display: block; font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .calc-row select, .calc-row input, .calc-row textarea { 
            width: 100%; padding: 14px; border-radius: 12px; background: #0f1622; 
            border: 1px solid #2a3a55; color: white; font-size: 14px; outline: none; transition: 0.3s;
        }
        .calc-row select:focus, .calc-row input:focus, .calc-row textarea:focus { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }

        .price-breakdown {
            background: rgba(0,212,255,0.05); padding: 20px; border-radius: 15px;
            text-align: center; border: 1px dashed var(--accent-color); margin-top: 20px;
        }
        .total-price { font-size: 32px; font-weight: 800; color: var(--accent-color); display: block; }
        
        .btn-main { 
            display: block; width: 100%; background: var(--accent-color); color: #000; 
            padding: 18px; border-radius: 35px; text-decoration: none; font-weight: 800; 
            text-align: center; margin-top: 20px; font-size: 15px; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-main:hover { filter: brightness(1.1); }

        .btn-sub-container { display: flex; gap: 12px; margin-top: 15px; }
        .btn-sub { 
            flex: 1; padding: 12px; border-radius: 25px; text-decoration: none; 
            font-size: 11px; font-weight: bold; text-align: center; color: white;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); transition: 0.3s;
        }

        .map-container { width: 100%; height: 280px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(0,212,255,0.2); }

        /* КНОПКА ТЕЛЕФОНА С АНИМАЦИЕЙ */
        .call-fixed { 
            position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; 
            background: var(--call-color); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; color: white; font-size: 28px; 
            z-index: 2000; box-shadow: 0 5px 20px rgba(40,167,69,0.4);
            animation: phone-vibrate 2s infinite;
        }
        @keyframes phone-vibrate {
            0%, 100% { transform: scale(1); }
            10%, 20% { transform: scale(1.1) rotate(-5deg); }
            30%, 40% { transform: scale(1.1) rotate(5deg); }
            50% { transform: scale(1); }
        }

        footer { text-align: center; padding: 40px 20px; opacity: 0.6; font-size: 11px; }
    </style>
</head>
<body>

<nav>
    <a href="#delivery">Доставка</a>
    <a href="#driver">Водитель</a>
    <a href="#map-block">Карта</a>
    <a href="#other">Помощь</a>
</nav>

<div class="container">
    <header class="animate__animated animate__fadeInDown">
        <div class="logo-circle">
            <img style="width:100%; height:100%; object-fit:cover;" src="https://raw.githubusercontent.com/Manak56/night-courier/main/icon.png" alt="Logo">
        </div>
        <h1 class="animate__animated animate__tracking-in-expand">НОЧНОЙ КУРЬЕР</h1>
        <p style="color:var(--accent-color); font-weight:bold; letter-spacing: 2px;">ОРЕНБУРГ | 22:00 — 06:00</p>
    </header>

    <section class="calculator reveal" id="delivery">
        <div class="section-title"><i class="fas fa-box"></i> Калькулятор Доставки</div>
        <div class="calc-row">
            <label>РАССТОЯНИЕ: <span id="distVal" style="color:var(--accent-color)">3</span> км</label>
            <input type="range" id="dist" min="1" max="25" value="3" oninput="updateDelivery()">
        </div>
        <div class="calc-row">
            <select id="del-time" onchange="updateDelivery()">
                <option value="0">22:00 - 00:00 (Без доплаты)</option>
                <option value="150">00:00 - 04:00 (+150₽ Ночь)</option>
                <option value="250">04:00 - 06:00 (+250₽ Раннее утро)</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;" class="calc-row">
            <input type="text" id="del-from" placeholder="Откуда" oninput="updateDelivery()">
            <input type="text" id="del-to" placeholder="Куда" oninput="updateDelivery()">
        </div>
        <textarea class="calc-row" id="del-list" rows="2" placeholder="Что купить?" oninput="updateDelivery()"></textarea>
        
        <div class="price-breakdown">
            💰 ИТОГО: <span id="del-total" class="total-price">300₽</span>
        </div>
        <a href="#" id="del-btn" class="btn-main"><i class="fab fa-telegram"></i> ЗАКАЗАТЬ</a>
        
        <div class="btn-sub-container">
            <a href="tel:+79999099924" class="btn-sub"><i class="fas fa-phone"></i> Позвонить</a>
            <a href="https://t.me/mankogame" class="btn-sub"><i class="fas fa-headset"></i> Помощь</a>
        </div>
    </section>

    <section class="calculator reveal" id="driver" style="border-color: #28a74533;">
        <div class="section-title" style="color: #28a745;"><i class="fas fa-user-check"></i> Трезвый водитель</div>
        <div class="calc-row">
            <select id="drv-tariff" onchange="updateDriver()">
                <option value="1000">По городу (1000₽)</option>
                <option value="1500">Пригород (1500₽)</option>
            </select>
        </div>
        <div class="calc-row" style="display:flex; gap:10px;">
            <input type="text" id="drv-from" placeholder="Откуда?" oninput="updateDriver()">
            <input type="text" id="drv-to" placeholder="Куда?" oninput="updateDriver()">
        </div>
        <div class="price-breakdown" style="border-color:#28a745;">
            💰 СУММА: <span id="drv-total" class="total-price" style="color:#28a745;">1000₽</span>
        </div>
        <a href="#" id="drv-btn" class="btn-main" style="background:#28a745;"><i class="fab fa-telegram"></i> ВЫЗВАТЬ</a>
    </section>

    <section class="map-section reveal" id="map-block">
        <div class="section-title"><i class="fas fa-map-marked-alt"></i> Карта 24/7</div>
        <div class="map-container">
            <iframe src="https://yandex.ru/map-widget/v1/?ll=55.1244%2C51.7681&z=12&l=map" allowfullscreen="true"></iframe>
        </div>
    </section>

    <section class="calculator reveal" id="other" style="border-color: #9c27b033;">
        <div class="section-title" style="color: #9c27b0;"><i class="fas fa-tools"></i> Иная помощь</div>
        <textarea id="other-task" rows="3" placeholder="Опишите ситуацию..." oninput="updateOther()" style="border-color:#9c27b0; height: 80px;"></textarea>
        <a href="#" id="other-btn" class="btn-main" style="background:#9c27b0; color:white;">ОТПРАВИТЬ</a>
    </section>

    <footer>
        <p style="color:#ff4444; font-weight:bold; margin-bottom:10px;">НЕ ЯВЛЯЕТСЯ ПУБЛИЧНОЙ ОФЕРТОЙ</p>
        <p>© 2026 Night Courier Orenburg.</p>
    </footer>
</div>

<a href="tel:+79999099924" class="call-fixed"><i class="fas fa-phone"></i></a>

<script>
    // 1. ЛОГИКА ПОЯВЛЕНИЯ ПРИ СКРОЛЛЕ
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // 2. КАЛЬКУЛЯТОРЫ
    function sendToTG(text) { return "https://t.me/mankogame?text=" + encodeURIComponent(text); }

    function updateDelivery() {
        const d = parseInt(document.getElementById('dist').value);
        const t = parseInt(document.getElementById('del-time').value);
        document.getElementById('distVal').innerText = d;
        const total = (d <= 3 ? 300 : d <= 7 ? 450 : d <= 12 ? 600 : 700) + t;
        document.getElementById('del-total').innerText = total + '₽';
        const msg = `📦 ДОСТАВКА\n📍 Из: ${document.getElementById('del-from').value}\n🏠 В: ${document.getElementById('del-to').value}\n📋 Список: ${document.getElementById('del-list').value}\n💰 Итого: ${total}₽`;
        document.getElementById('del-btn').href = sendToTG(msg);
    }

    function updateDriver() {
        const total = document.getElementById('drv-tariff').value;
        document.getElementById('drv-total').innerText = total + '₽';
        const msg = `🚗 ВОДИТЕЛЬ\n📍 От: ${document.getElementById('drv-from').value}\n🏠 До: ${document.getElementById('drv-to').value}\n💰 Сумма: ${total}₽`;
        document.getElementById('drv-btn').href = sendToTG(msg);
    }

    function updateOther() {
        const msg = `🛠 ПОМОЩЬ\n📝 Суть: ${document.getElementById('other-task').value}`;
        document.getElementById('other-btn').href = sendToTG(msg);
    }

    window.onload = () => { updateDelivery(); updateDriver(); updateOther(); };
</script>
</body>
</html>
