<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Ночной Курьер | Оренбург</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --bg-color: #0b101b; --accent-color: #00d4ff; --text-color: #ffffff;
            --card-bg: rgba(18, 24, 34, 0.96); --call-color: #28a745;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        
        body {
            font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color);
            background-image: linear-gradient(rgba(11,16,27,0.9), rgba(11,16,27,0.9)), url('https://raw.githubusercontent.com/Manak56/night-courier/main/image.png');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* ИСПРАВЛЕНИЕ: ПРИНУДИТЕЛЬНЫЕ ЦВЕТА ДЛЯ ПОЛЕЙ */
        input, select, textarea {
            background-color: #0f1622 !important;
            color: #ffffff !important;
            border: 1px solid #2a3a55 !important;
            -webkit-appearance: none; /* Убирает системные стили iOS */
        }

        /* Видимость подсказок (placeholder) */
        ::placeholder { color: rgba(255, 255, 255, 0.5) !important; opacity: 1; }
        :-ms-input-placeholder { color: rgba(255, 255, 255, 0.5) !important; }
        ::-ms-input-placeholder { color: rgba(255, 255, 255, 0.5) !important; }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        nav {
            position: sticky; top: 0; background: rgba(11, 16, 27, 0.98);
            padding: 12px; display: flex; justify-content: center; gap: 15px;
            z-index: 1000; border-bottom: 1px solid var(--accent-color); backdrop-filter: blur(10px);
        }
        nav a { color: white; text-decoration: none; font-size: 10px; text-transform: uppercase; font-weight: bold; }

        .container { max-width: 480px; margin: 0 auto; padding: 15px; }
        
        header { text-align: center; margin-bottom: 25px; }
        .logo-circle { width: 80px; height: 80px; border: 2px solid var(--accent-color); border-radius: 50%; margin: 0 auto 10px; overflow: hidden; box-shadow: 0 0 20px rgba(0,212,255,0.4); }

        /* БАННЕР АКЦИИ */
        .promo-banner {
            background: linear-gradient(45deg, #ff4444, #ff8800); color: white;
            padding: 10px; border-radius: 12px; text-align: center; font-weight: bold;
            font-size: 13px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255,68,68,0.3);
        }

        .calculator, .map-section { background: var(--card-bg); border-radius: 18px; padding: 18px; margin-bottom: 20px; border: 1px solid rgba(0,212,255,0.2); }
        .section-title { color: var(--accent-color); font-size: 16px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .calc-row { margin-bottom: 15px; }
        .calc-row label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        
        .calc-row select, .calc-row input, .calc-row textarea { 
            width: 100%; padding: 12px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.3s;
        }
        .calc-row select:focus, .calc-row input:focus, .calc-row textarea:focus { border-color: var(--accent-color) !important; box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }

        .price-breakdown {
            background: rgba(0,212,255,0.1); padding: 15px; border-radius: 12px;
            text-align: center; border: 1px dashed var(--accent-color); margin-top: 15px;
        }
        .total-price { font-size: 28px; font-weight: 800; color: var(--accent-color); display: block; }
        .price-detail { font-size: 10px; color: #888; margin-top: 5px; }
        
        .btn-main { 
            display: block; width: 100%; background: var(--accent-color); color: #000; 
            padding: 16px; border-radius: 30px; text-decoration: none; font-weight: bold; 
            text-align: center; margin-top: 15px; font-size: 14px;
        }
        .btn-sub-container { display: flex; gap: 10px; margin-top: 10px; }
        .btn-sub { 
            flex: 1; padding: 10px; border-radius: 20px; text-decoration: none; 
            font-size: 11px; font-weight: bold; text-align: center; color: white;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
        }

        .map-container { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(0,212,255,0.3); }
        .call-fixed { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--call-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 25px; z-index: 2000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<nav>
    <a href="#delivery">Доставка</a>
    <a href="#driver">Водитель</a>
    <a href="#map-block">Карта</a>
    <a href="#other">Помощь</a>
</nav>

<div class="container">
    <header class="animate__animated animate__fadeIn">
        <div class="logo-circle">
            <img style="width:100%; height:100%; object-fit:cover;" src="https://raw.githubusercontent.com/Manak56/night-courier/main/icon.png">
        </div>
        <h1>НОЧНОЙ КУРЬЕР</h1>
        <p style="color:var(--accent-color); font-weight:bold; font-size: 12px;">ОРЕНБУРГ | 22:00 — 06:00</p>
    </header>

    <div class="promo-banner animate__animated animate__pulse animate__infinite">
        🎁 Каждая 3-я доставка — скидка 25%!
    </div>

    <section class="calculator reveal" id="delivery">
        <div class="section-title"><i class="fas fa-box"></i> Калькулятор Доставки</div>
        <div class="calc-row">
            <label>РАССТОЯНИЕ: <span id="distVal" style="color:var(--accent-color)">3</span> км</label>
            <input type="range" id="dist" min="1" max="25" value="3" oninput="updateDelivery()">
        </div>
        <div class="calc-row">
            <select id="del-time" onchange="updateDelivery()">
                <option value="0">22:00 - 00:00 (Без доплаты)</option>
                <option value="100">00:00 - 02:00 (+100₽)</option>
                <option value="200">02:00 - 04:00 (+200₽)</option>
                <option value="250">04:00 - 06:00 (+250₽)</option>
            </select>
        </div>
        <div style="display:flex; gap:10px;" class="calc-row">
            <input type="text" id="del-from" placeholder="Откуда">
            <input type="text" id="del-to" placeholder="Куда">
        </div>
        <textarea id="del-list" rows="2" placeholder="Что купить?" class="calc-row"></textarea>
        
        <div class="price-breakdown">
            💰 ИТОГО: <span id="del-total" class="total-price">300₽</span>
            <div id="del-detail" class="price-detail">База: 300₽</div>
        </div>
        <a href="#" id="del-btn" class="btn-main"><i class="fab fa-telegram"></i> ЗАКАЗАТЬ</a>
    </section>

    <section class="map-section reveal" id="map-block">
        <div class="section-title"><i class="fas fa-map-marked-alt"></i> Карта Оренбурга</div>
        <div class="map-container">
            <iframe src="https://yandex.ru/map-widget/v1/?ll=55.1244%2C51.7681&z=12" width="100%" height="100%"></iframe>
        </div>
    </section>

    <section class="calculator reveal" id="other" style="border-color: #9c27b0;">
        <div class="section-title" style="color: #9c27b0;"><i class="fas fa-tools"></i> Иная помощь</div>
        <textarea id="other-task" rows="3" placeholder="Опишите ситуацию..." oninput="updateOther()" style="border-color:#9c27b0 !important;"></textarea>
        <a href="#" id="other-btn" class="btn-main" style="background:#9c27b0; color:white;">ОТПРАВИТЬ</a>
    </section>

    <footer style="text-align:center; padding: 20px; font-size: 10px; opacity: 0.5;">
        <p>НЕ ЯВЛЯЕТСЯ ПУБЛИЧНОЙ ОФЕРТОЙ</p>
        <p>© 2026 Night Courier Orenburg.</p>
    </footer>
</div>

<a href="tel:+79999099924" class="call-fixed"><i class="fas fa-phone"></i></a>

<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    function sendToTG(text) { return "https://t.me/mankogame?text=" + encodeURIComponent(text); }

    function updateDelivery() {
        const d = parseInt(document.getElementById('dist').value);
        const t = parseInt(document.getElementById('del-time').value);
        document.getElementById('distVal').innerText = d;
        let base = d <= 3 ? 300 : d <= 7 ? 450 : d <= 12 ? 600 : 650;
        const total = base + t;
        document.getElementById('del-total').innerText = total + '₽';
        document.getElementById('del-detail').innerText = `База: ${base}₽ + доплата: ${t}₽`;
        const msg = `📦 ЗАКАЗ\n📍 Откуда: ${document.getElementById('del-from').value}\n🏠 Куда: ${document.getElementById('del-to').value}\n📋 Список: ${document.getElementById('del-list').value}\n💰 Итого: ${total}₽`;
        document.getElementById('del-btn').href = sendToTG(msg);
    }

    function updateOther() {
        const msg = `🛠 ПОМОЩЬ\n📝 Суть: ${document.getElementById('other-task').value}`;
        document.getElementById('other-btn').href = sendToTG(msg);
    }

    window.onload = updateDelivery;
</script>
</body>
</html>
