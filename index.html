<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Courier | Оренбург</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0b101b;
            background-image: linear-gradient(rgba(11,16,27,0.85), rgba(11,16,27,0.85)), url('https://raw.githubusercontent.com/Manak56/night-courier/main/image.png');
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 16px; }
        .card {
            background: rgba(22,27,34,0.96);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,212,255,0.2);
        }
        h1, h2 { color: #00d4ff; }
        .promo {
            background: linear-gradient(45deg, #ff4444, #ff8800);
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        input, select, textarea {
            width: 100%;
            background: #0f1622;
            border: 1px solid #2a3a55;
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            margin-bottom: 12px;
        }
        button {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .flex-buttons { display: flex; gap: 10px; }
        .flex-buttons button { flex: 1; }
        .btn-call { background: #28a745; color: #fff; }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #28a745;
            padding: 10px 20px;
            border-radius: 30px;
            opacity: 0;
            transition: 0.3s;
            z-index: 2000;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://raw.githubusercontent.com/Manak56/night-courier/main/icon.png" style="width: 80px; border-radius: 50%;">
        <h1>НОЧНОЙ КУРЬЕР</h1>
        <p style="color:#00d4ff;">ОРЕНБУРГ | 22:00 — 06:00</p>
    </div>

    <div class="promo">🎁 КАЖДАЯ 3-Я ДОСТАВКА — СКИДКА 25%!</div>

    <div class="card">
        <h2>📦 Калькулятор доставки</h2>
        <input type="text" id="clientName" placeholder="Ваше имя *">
        <input type="tel" id="clientPhone" placeholder="Номер телефона *">
        <input type="text" id="from" placeholder="Откуда">
        <input type="text" id="to" placeholder="Куда">
        <textarea id="list" rows="2" placeholder="Что передать?"></textarea>
        <div>📏 Расстояние: <span id="distVal">3</span> км</div>
        <input type="range" id="dist" min="1" max="25" value="3">
        <select id="time">
            <option value="0">22:00–00:00 (без доплаты)</option>
            <option value="100">00:00–02:00 (+100₽)</option>
            <option value="200">02:00–04:00 (+200₽)</option>
            <option value="250">04:00–06:00 (+250₽)</option>
        </select>
        <select id="complex">
            <option value="0">Сложный маршрут: Нет</option>
            <option value="150">Да (+150₽)</option>
        </select>
        <select id="heavy">
            <option value="0">Тяжёлый груз: Нет</option>
            <option value="100">Да (+100₽)</option>
        </select>
        <div style="background: rgba(0,212,255,0.1); padding: 12px; border-radius: 16px; text-align: center; margin: 10px 0;">
            💰 ИТОГО: <span id="total" style="font-size: 24px; color:#00d4ff;">300₽</span>
        </div>
        <div class="flex-buttons">
            <button id="sendOrderBtn"><i class="fab fa-telegram"></i> Заказать</button>
            <button class="btn-call" onclick="window.location.href='tel:+79999099924'"><i class="fas fa-phone"></i> Позвонить</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">✅ Заказ отправлен!</div>

<script>
    const APP_SCRIPT_URL = 'https://vk.com/away.php?to=https%3A%2F%2Fscript.google.com%2Fmacros%2Fs%2FAKfycbywXfSTT9bOGsnqQHWzwshy_RWWm0cMxylNtFVzphW_xfn3vmgb7rE5X8F0kNfQItA4%2Fexec&utf=1';

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function sendToSheet(data) {
        try {
            await fetch(APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return true;
        } catch(e) { return false; }
    }

    // Калькулятор
    const distSlider = document.getElementById('dist');
    const distVal = document.getElementById('distVal');
    const timeSelect = document.getElementById('time');
    const complexSelect = document.getElementById('complex');
    const heavySelect = document.getElementById('heavy');
    const totalSpan = document.getElementById('total');

    function updateDelivery() {
        let d = parseInt(distSlider.value);
        let t = parseInt(timeSelect.value);
        let c = parseInt(complexSelect.value);
        let h = parseInt(heavySelect.value);
        let base = d <= 3 ? 300 : d <= 7 ? 450 : d <= 12 ? 600 : 650;
        let total = base + t + c + h;
        distVal.innerText = d;
        totalSpan.innerText = total + '₽';
    }
    distSlider.addEventListener('input', updateDelivery);
    timeSelect.addEventListener('change', updateDelivery);
    complexSelect.addEventListener('change', updateDelivery);
    heavySelect.addEventListener('change', updateDelivery);
    updateDelivery();

    // Отправка заказа
    document.getElementById('sendOrderBtn').addEventListener('click', async () => {
        const name = document.getElementById('clientName').value.trim();
        const phone = document.getElementById('clientPhone').value.trim();
        if (!name || !phone) { alert('Введите имя и телефон'); return; }
        
        const order = {
            type: 'delivery',
            name: name,
            phone: phone,
            from: document.getElementById('from').value,
            to: document.getElementById('to').value,
            list: document.getElementById('list').value,
            distance: parseInt(distSlider.value),
            time: timeSelect.options[timeSelect.selectedIndex].text,
            total: totalSpan.innerText
        };
        await sendToSheet(order);
        showToast();
        // Очистка полей
        document.getElementById('clientName').value = '';
        document.getElementById('clientPhone').value = '';
        document.getElementById('from').value = '';
        document.getElementById('to').value = '';
        document.getElementById('list').value = '';
        distSlider.value = '3';
        timeSelect.value = '0';
        complexSelect.value = '0';
        heavySelect.value = '0';
        updateDelivery();
    });
</script>
</body>
</html>
